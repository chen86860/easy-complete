name: Build ARM DMG

on:
  push:
    tags:
      - "v*"
      - "*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-arm-dmg:
    name: Build ARM DMG
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Verify Apple Silicon runner
        run: |
          test "$(uname -m)" = "arm64"
          sw_vers

      - name: Install build dependencies
        run: brew install bash fish jq protobuf shellcheck zsh

      - name: Set up Rust
        run: |
          rustup show
          rustup target add aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: arm64-dmg

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Build app bundle
        run: ./scripts/build-app.sh

      - name: Package ARM DMG
        run: ./scripts/make-dmg.sh dist/Easy-Complete-arm64.dmg

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: Easy-Complete-arm64
          path: dist/Easy-Complete-arm64.dmg

      - name: Attach DMG to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Easy-Complete-arm64.dmg
          fail_on_unmatched_files: true
          body: |
            ### Install

            1. Download `Easy-Complete-arm64.dmg`, open it, and drag **Easy Complete** to Applications.
            2. The build is unsigned, so macOS Gatekeeper will quarantine it. Clear the quarantine flag once:
               ```bash
               xattr -dr com.apple.quarantine "/Applications/Easy Complete.app"
               ```
            3. Launch **Easy Complete**. On first launch, the app registers the bundled input
               method and asks for **Accessibility** permission. Autocomplete will not appear
               until Accessibility is granted in System Settings -> Privacy & Security ->
               Accessibility.
            4. Reload your shell: `exec $SHELL`
