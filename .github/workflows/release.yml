name: Build ARM DMG

on:
  push:
    tags:
      - "v*"
      - "*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  SPARKLE_VERSION: 2.9.3

jobs:
  build-arm-dmg:
    name: Build ARM DMG
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Record start time
        id: start
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7

      - name: Verify Apple Silicon runner
        run: |
          test "$(uname -m)" = "arm64"
          sw_vers

      - name: Cache Homebrew packages
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: brew-${{ runner.arch }}-bash-create-dmg-fish-jq-protobuf-shellcheck-zsh-v1

      - name: Install build dependencies
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: brew install bash create-dmg fish jq protobuf shellcheck zsh

      - name: Cache Sparkle framework
        uses: actions/cache@v5
        with:
          path: build/sparkle
          key: sparkle-${{ env.SPARKLE_VERSION }}

      - name: Set up Rust
        run: |
          rustup show
          rustup target add aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: arm64-dmg

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Import Developer ID certificate
        if: startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          test -n "$APPLE_CERTIFICATE_P12_BASE64"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          KEYCHAIN_PASSWORD="${KEYCHAIN_PASSWORD:-$(uuidgen)}"
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/easy-complete-signing.keychain-db"

          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          mapfile -t EXISTING_KEYCHAINS < <(security list-keychain -d user | sed 's/[ "]//g')
          security list-keychain -d user -s "$KEYCHAIN_PATH" "${EXISTING_KEYCHAINS[@]}"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build app bundle
        env:
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
          SPARKLE_APPCAST_URL: https://github.com/${{ github.repository }}/releases/latest/download/appcast.xml
          POSTHOG_ENDPOINT: ${{ secrets.POSTHOG_ENDPOINT }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        run: ./scripts/build-app.sh

      - name: Sign app bundle
        if: startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: ./scripts/sign-macos-app.sh

      - name: Package ARM DMG
        if: startsWith(github.ref, 'refs/tags/')
        run: ./scripts/make-dmg.sh dist/Easy-Complete-arm64.dmg

      - name: Notarize DMG
        if: startsWith(github.ref, 'refs/tags/')
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
          APPLE_NOTARY_KEY: ${{ secrets.APPLE_NOTARY_KEY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: ./scripts/notarize-dmg.sh dist/Easy-Complete-arm64.dmg

      - name: Prepare Sparkle archives
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_TAG: ${{ github.ref_name }}
          HISTORY_LIMIT: 8
          APPCAST_DIR: dist/sparkle
        run: |
          set -euo pipefail

          APP_VERSION="${CURRENT_TAG#v}"
          VERSIONED_DMG="dist/Easy-Complete-${APP_VERSION}-arm64.dmg"
          VERSIONED_NAME="$(basename "$VERSIONED_DMG")"

          rm -rf "$APPCAST_DIR"
          mkdir -p "$APPCAST_DIR"

          cp dist/Easy-Complete-arm64.dmg "$VERSIONED_DMG"
          cp "$VERSIONED_DMG" "$APPCAST_DIR/$VERSIONED_NAME"

          RELEASES_JSON="$RUNNER_TEMP/releases.json"
          gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=20" > "$RELEASES_JSON"
          mapfile -t PREVIOUS_TAGS < <(
            jq -r --arg current "$CURRENT_TAG" --argjson limit "$HISTORY_LIMIT" \
              '[.[] | select(.draft == false) | select(.prerelease == false) | select(.tag_name != $current)] | .[:$limit][] | .tag_name' \
              "$RELEASES_JSON"
          )

          if [ "${#PREVIOUS_TAGS[@]}" -eq 0 ]; then
            echo "No previous releases found; generating a full-update-only appcast."
            exit 0
          fi

          PREVIOUS_APPCAST_DIR="$RUNNER_TEMP/previous-appcast"
          mkdir -p "$PREVIOUS_APPCAST_DIR"
          if gh release download "${PREVIOUS_TAGS[0]}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "appcast.xml" \
            --dir "$PREVIOUS_APPCAST_DIR" \
            --clobber; then
            mv "$PREVIOUS_APPCAST_DIR/appcast.xml" "$APPCAST_DIR/appcast.xml"
          else
            echo "Previous appcast.xml not found; generating a full-update-only appcast."
            exit 0
          fi

          for tag in "${PREVIOUS_TAGS[@]}"; do
            version="${tag#v}"
            dest="$APPCAST_DIR/Easy-Complete-${version}-arm64.dmg"
            tmp="$RUNNER_TEMP/sparkle-${tag//[^A-Za-z0-9._-]/_}"
            rm -rf "$tmp"
            mkdir -p "$tmp"

            if gh release download "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "Easy-Complete-${version}-arm64.dmg" \
              --dir "$tmp" \
              --clobber; then
              mv "$tmp/Easy-Complete-${version}-arm64.dmg" "$dest"
            elif gh release download "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "Easy-Complete-arm64.dmg" \
              --dir "$tmp" \
              --clobber; then
              mv "$tmp/Easy-Complete-arm64.dmg" "$dest"
            else
              echo "Skipping $tag: no compatible ARM64 DMG asset found."
            fi
          done

      - name: Extract release notes from CHANGELOG.md
        if: startsWith(github.ref, 'refs/tags/')
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          NOTES=$(awk "/^## ${VERSION}$/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md | sed '/^[[:space:]]*$/d')
          if [ -z "$NOTES" ]; then
            NOTES="See the [GitHub release](https://github.com/${{ github.repository }}/releases/tag/${VERSION}) for details."
          fi
          echo "SPARKLE_RELEASE_NOTES<<EOF" >> "$GITHUB_ENV"
          echo "$NOTES" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Generate Sparkle appcast
        if: startsWith(github.ref, 'refs/tags/')
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
          SPARKLE_DOWNLOAD_URL_PREFIX: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/
          SPARKLE_BUNDLE_VERSION: ${{ github.ref_name }}
        run: |
          APP_VERSION="${SPARKLE_BUNDLE_VERSION#v}"
          SPARKLE_BUNDLE_VERSION="$APP_VERSION" \
          ./scripts/generate-sparkle-appcast.sh "dist/Easy-Complete-${APP_VERSION}-arm64.dmg"

      - name: Verify release assets
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          APP_VERSION="${GITHUB_REF_NAME#v}"
          test -f dist/Easy-Complete-arm64.dmg
          test -f "dist/Easy-Complete-${APP_VERSION}-arm64.dmg"
          test -f dist/sparkle/appcast.xml
          find dist/sparkle -maxdepth 1 -name '*.delta' -print

      - name: Classify release channel
        if: startsWith(github.ref, 'refs/tags/')
        id: release_channel
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF_NAME" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+-(alpha|beta|rc)(\.[0-9A-Za-z-]+)*$ ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload build artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v6
        with:
          name: Easy-Complete-arm64
          path: |
            dist/Easy-Complete-arm64.dmg
            dist/Easy-Complete-*-arm64.dmg
            dist/sparkle/appcast.xml
            dist/sparkle/*.delta

      - name: Attach DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/Easy-Complete-arm64.dmg
            dist/Easy-Complete-*-arm64.dmg
            dist/sparkle/appcast.xml
            dist/sparkle/*.delta
          fail_on_unmatched_files: false
          prerelease: ${{ steps.release_channel.outputs.is_prerelease == 'true' }}
          body: |
            ${{ steps.changelog.outputs.notes }}

            ---

            ### Install

            1. Download `Easy-Complete-arm64.dmg`, open it, and drag **Easy Complete** to Applications.
            2. Launch **Easy Complete**. On first launch, the app registers the bundled input
               method and asks for **Accessibility** permission. Autocomplete will not appear
               until Accessibility is granted in System Settings -> Privacy & Security ->
               Accessibility.
            3. Reload your shell: `exec $SHELL`

            This DMG is Developer ID signed, notarized, and published with a Sparkle appcast for future updates.

      - name: Send Telegram notification
        if: always() && env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PRODUCT_NAME: Easy Complete
          BUILD_RESULT: ${{ job.status }}
          GH_ACTOR: ${{ github.actor }}
          GH_REF: ${{ github.ref_name }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STARTED_AT: ${{ steps.start.outputs.started_at }}
        run: |
          ELAPSED=$(( $(date +%s) - STARTED_AT ))
          DURATION="$(( ELAPSED / 60 ))m $(( ELAPSED % 60 ))s"

          case "$BUILD_RESULT" in
            success)   OVERALL="✅ ${PRODUCT_NAME} 构建成功" ;;
            failure)   OVERALL="❌ ${PRODUCT_NAME} 构建失败" ;;
            cancelled) OVERALL="⚠️ ${PRODUCT_NAME} 取消" ;;
            *)         OVERALL="❓ ${PRODUCT_NAME} 未知" ;;
          esac

          RAW_MSG=$(git log -1 --pretty=format:"%s" HEAD)
          if [ ${#RAW_MSG} -gt 80 ]; then
            COMMIT_MSG="${RAW_MSG:0:80}..."
          else
            COMMIT_MSG="$RAW_MSG"
          fi

          MESSAGE=$(cat <<EOF
          ${OVERALL}

          🏷️ 版本：\`${GH_REF}\`
          👤 触发者：${GH_ACTOR}
          📝 提交：\`${GITHUB_SHA:0:7}\` ${COMMIT_MSG}
          ⏰ 时间：$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S CST')
          ⏱️ 耗时：${DURATION}

          🔗 查看详情：${GH_RUN_URL}
          EOF
          )

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":$(echo "$MESSAGE" | jq -Rs .),\"disable_web_page_preview\":true}"
