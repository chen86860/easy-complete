name: Release

on:
  push:
    tags:
      - "v*"          # e.g. v2.0.1
      - "*.*.*"       # e.g. 2.0.0 (matches the existing tag style too)
  workflow_dispatch: # allow manual runs (uploads artifacts only, no release)

permissions:
  contents: write   # needed to create/update the GitHub Release

jobs:
  build-dmg:
    name: Build DMG (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14   # Apple Silicon
          - arch: x86_64
            runner: macos-13   # Intel
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: brew install protobuf

      - name: Set up Rust (honors rust-toolchain.toml)
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & assemble the .app
        run: ./scripts/build-app.sh

      - name: Package DMG
        run: ./scripts/make-dmg.sh "dist/Easy-Complete-${{ matrix.arch }}.dmg"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Easy-Complete-${{ matrix.arch }}
          path: dist/Easy-Complete-${{ matrix.arch }}.dmg

      - name: Attach DMG to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Easy-Complete-${{ matrix.arch }}.dmg
          fail_on_unmatched_files: true
          body: |
            ### Install

            1. Download the DMG for your Mac (`arm64` for Apple Silicon, `x86_64` for Intel), open it, and drag **Easy Complete** to Applications.
            2. The build is unsigned, so macOS Gatekeeper will quarantine it. Clear the quarantine flag once:
               ```bash
               xattr -dr com.apple.quarantine "/Applications/Easy Complete.app"
               ```
            3. Launch **Easy Complete**, then grant **Accessibility** permission when prompted
               (System Settings → Privacy & Security → Accessibility). Autocomplete will not
               appear until this is granted.
            4. Reload your shell: `exec $SHELL`
