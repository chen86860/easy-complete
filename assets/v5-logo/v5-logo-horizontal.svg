<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">v5 horizontal logo</title>
  <desc id="desc">A horizontal v5 command line tool logo with a terminal-inspired icon and compact wordmark.</desc>
  <defs>
    <linearGradient id="shell" x1="60" y1="34" x2="326" y2="328" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#151A22"/>
      <stop offset="1" stop-color="#070A0F"/>
    </linearGradient>
    <linearGradient id="v-stroke" x1="99" y1="126" x2="214" y2="239" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5BFFB0"/>
      <stop offset="1" stop-color="#00C77B"/>
    </linearGradient>
    <linearGradient id="five-stroke" x1="215" y1="122" x2="288" y2="246" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7CE7FF"/>
      <stop offset="1" stop-color="#1C9BFF"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="410" y1="95" x2="690" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5F8FF"/>
      <stop offset="1" stop-color="#B8C4D8"/>
    </linearGradient>
    <filter id="soft-shadow" x="36" y="28" width="324" height="324" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="0" fill="transparent"/>

  <g filter="url(#soft-shadow)">
    <rect x="54" y="42" width="276" height="276" rx="64" fill="url(#shell)"/>
    <rect x="66" y="54" width="252" height="252" rx="54" stroke="#2B3442" stroke-width="2"/>
  </g>
  <path d="M92 123L156 241L220 123" stroke="#38F59A" stroke-width="31" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M292 122H230L222 178H268C289 178 306 195 306 217C306 241 287 258 257 258H225" stroke="#44C8FF" stroke-width="31" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M414 112L493 246L572 112" stroke="#15D98A" stroke-width="46" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M740 112H620L610 176H684C723 176 750 204 750 241C750 281 717 310 666 310H612" stroke="#101820" stroke-width="46" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
