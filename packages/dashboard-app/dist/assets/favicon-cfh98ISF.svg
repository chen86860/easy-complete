<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">v5 logo</title>
  <desc id="desc">A terminal-inspired v5 logo with a dark rounded square, a green vector v, and a cyan five.</desc>
  <defs>
    <linearGradient id="shell" x1="72" y1="52" x2="440" y2="460" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#151A22"/>
      <stop offset="1" stop-color="#070A0F"/>
    </linearGradient>
    <linearGradient id="v-stroke" x1="126" y1="178" x2="286" y2="334" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5BFFB0"/>
      <stop offset="1" stop-color="#00C77B"/>
    </linearGradient>
    <linearGradient id="five-stroke" x1="286" y1="168" x2="386" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7CE7FF"/>
      <stop offset="1" stop-color="#1C9BFF"/>
    </linearGradient>
    <filter id="soft-shadow" x="48" y="48" width="416" height="424" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <g filter="url(#soft-shadow)">
    <rect x="72" y="60" width="368" height="384" rx="92" fill="url(#shell)"/>
    <rect x="88" y="76" width="336" height="352" rx="78" stroke="#2B3442" stroke-width="2"/>
  </g>

  <path d="M116 170L203 330L290 170" stroke="#38F59A" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M386 168H302L292 244H354C382 244 404 266 404 296C404 329 378 352 338 352H294" stroke="#44C8FF" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
